name: PR Check

permissions:
  contents: read
  issues: read
  pull-requests: read

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  pr-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@v0.2.1
        with:
          max-failures: 4
          require-description: true

          # require-linked-issue: false
          blocked-terms:  |
            🤖 Generated with Claude Code

          require-pr-template: true
          strict-pr-template-sections: "✅  / Checklist"

          detect-spam-usernames: true
          min-account-age: 30

          failure-add-pr-labels: "pr-check-failed"
          failure-pr-message: " PR  AI  (AI Slop)/ Thank you for your submission. This PR has been closed because it does not follow our contribution template and has been identified as purely AI-generated content (AI Slop) without meaningful human involvement. We prioritize contributions that are human-verified and reflect individual effort. If you believe this is a mistake, please let us know by replying to this comment."
          close-pr: true
